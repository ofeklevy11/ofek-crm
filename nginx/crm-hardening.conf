server_tokens off;

# DNS resolver for OCSP stapling
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# Rate limit zones
limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=webhooks:10m rate=100r/s;

# Connection limit zone
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Use 429 for rate/conn limits
limit_req_status 429;
limit_conn_status 429;
limit_req_log_level warn;

# Bad bot detection (scanners, attack tools)
map $http_user_agent $bad_bot {
    default 0;
    ~*(?:sqlmap|nikto|nmap|masscan|zgrab|nuclei|gobuster|dirbuster|wfuzz|ffuf|hydra|medusa) 1;
    "" 1;
}

# Allowed HTTP methods only
map $request_method $bad_method {
    default 1;
    GET 0; POST 0; PUT 0; DELETE 0; PATCH 0; OPTIONS 0; HEAD 0;
}
