# ── bizlycrm.com (HTTPS) ──
server {
    listen 443 ssl http2;
    server_name bizlycrm.com www.bizlycrm.com;

    # SSL (Certbot-managed certificates)
    ssl_certificate /etc/letsencrypt/live/bizlycrm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bizlycrm.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # OCSP stapling disabled — LE ECDSA certs lack OCSP responder URL
    # ssl_stapling on;
    # ssl_stapling_verify on;

    client_max_body_size 50M;

    # Buffer hardening
    client_body_buffer_size 256k;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;

    # Timeout hardening (Slowloris protection)
    client_header_timeout 10s;
    client_body_timeout 30s;
    send_timeout 30s;
    keepalive_timeout 65s;
    keepalive_requests 100;
    reset_timedout_connection on;

    # Connection limit
    limit_conn addr 80;

    # Security headers (defense-in-depth, Next.js also sets these)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Hide server fingerprints
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Custom error pages (JSON)
    error_page 429 /429.json;
    location = /429.json {
        root /etc/nginx/custom-errors;
        internal;
        default_type application/json;
    }

    error_page 502 /502.json;
    location = /502.json {
        root /etc/nginx/custom-errors;
        internal;
        default_type application/json;
    }

    error_page 503 /503.json;
    location = /503.json {
        root /etc/nginx/custom-errors;
        internal;
        default_type application/json;
    }

    error_page 504 /504.json;
    location = /504.json {
        root /etc/nginx/custom-errors;
        internal;
        default_type application/json;
    }

    # Block bad bots
    if ($bad_bot) {
        return 444;
    }

    # Block bad HTTP methods
    if ($bad_method) {
        return 444;
    }

    # Login rate limiting (strict brute-force protection)
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE (long-lived connections)
    location /api/sse {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhooks (Meta WhatsApp — IP-restricted to Meta servers only)
    location /api/webhooks/ {
        include /etc/nginx/snippets/meta-webhook-allow.conf;
        limit_req zone=webhooks burst=200 nodelay;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Inngest (internal service comms)
    location /api/inngest {
        limit_req zone=webhooks burst=200 nodelay;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoints (no rate limit, no logging)
    location /api/health/ {
        access_log off;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public meeting pages
    location /api/p/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal cron
    location /api/cron/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # File uploads (large body, extended timeouts)
    location /api/uploadthing {
        limit_req zone=api burst=20 nodelay;
        client_body_timeout 120s;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets (immutable cache)
    location /_next/static/ {
        limit_req zone=general burst=200 nodelay;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Repeat all security headers (add_header in location drops server-level headers)
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-XSS-Protection "0" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    }

    # Default proxy (pages, WebSocket upgrade)
    location / {
        limit_req zone=general burst=100 nodelay;
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Block dotfiles (.env, .git, etc)
    location ~ /\. {
        return 444;
    }
}

# ── bizlycrm.com (HTTP → HTTPS redirect) ──
server {
    listen 80;
    server_name bizlycrm.com www.bizlycrm.com;
    return 301 https://$host$request_uri;
}

# ── stub_status for nginx-prometheus-exporter (localhost only) ──
server {
    listen 8484;
    server_name localhost;
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;

    location /stub_status {
        stub_status;
    }
}

# ── monitoring.bizlycrm.com (HTTPS) ──
server {
    listen 443 ssl http2;
    server_name monitoring.bizlycrm.com;

    # SSL (Certbot-managed certificates)
    ssl_certificate /etc/letsencrypt/live/monitoring.bizlycrm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitoring.bizlycrm.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # OCSP stapling disabled — LE ECDSA certs lack OCSP responder URL
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # Buffer hardening
    client_body_buffer_size 256k;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;

    # Timeout hardening
    client_header_timeout 10s;
    client_body_timeout 30s;
    send_timeout 30s;
    keepalive_timeout 65s;
    keepalive_requests 100;
    reset_timedout_connection on;

    # Connection & rate limits
    limit_conn addr 30;
    limit_req zone=monitoring burst=50 nodelay;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Hide server fingerprints
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Custom error pages (JSON)
    error_page 502 /502.json;
    location = /502.json {
        root /etc/nginx/custom-errors;
        internal;
        default_type application/json;
    }

    error_page 503 /503.json;
    location = /503.json {
        root /etc/nginx/custom-errors;
        internal;
        default_type application/json;
    }

    error_page 504 /504.json;
    location = /504.json {
        root /etc/nginx/custom-errors;
        internal;
        default_type application/json;
    }

    # Block bad bots
    if ($bad_bot) {
        return 444;
    }

    # Block bad HTTP methods
    if ($bad_method) {
        return 444;
    }

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Grafana Live
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── monitoring.bizlycrm.com (HTTP → HTTPS redirect) ──
server {
    listen 80;
    server_name monitoring.bizlycrm.com;
    return 301 https://$host$request_uri;
}
