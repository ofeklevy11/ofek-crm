# Docs: https://developers.facebook.com/docs/whatsapp/cloud-api/support/ip-addresses
# Last updated: 2026-03-07
#
# NOTE: If Cloudflare proxy is active, cloudflare-realip.conf MUST also be
# active so $remote_addr reflects Meta's real IP (not Cloudflare's edge IP).

