global:
  resolve_timeout: 5m

route:
  receiver: webhook-receiver
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: webhook-receiver
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: webhook-receiver
      repeat_interval: 4h

receivers:
  - name: webhook-receiver
    webhook_configs:
      - url: "http://webhook-receiver:9095/alert"
        send_resolved: true
        http_config:
          http_headers:
            X-Webhook-Secret:
              files:
                - /tmp/webhook_secret
