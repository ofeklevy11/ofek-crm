global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "nextjs-app"
    metrics_path: /api/metrics
    scrape_interval: 15s
    authorization:
      credentials_file: /tmp/cron_secret
    static_configs:
      - targets: ["app:3000"]
        labels:
          service: "crm-app"

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "host"

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: "docker"

  - job_name: "blackbox-tls"
    metrics_path: /probe
    params:
      module: [tls_connect]
    static_configs:
      - targets:
          - "bizlycrm.com:443"
          - "monitoring.bizlycrm.com:443"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "nginx-exporter"
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: "nginx"
