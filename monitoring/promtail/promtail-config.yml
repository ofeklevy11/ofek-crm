server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
    pipeline_stages:
      # Parse JSON logs from the Next.js app container
      - match:
          selector: '{container=~".*app.*"}'
          stages:
            - json:
                expressions:
                  level: level
                  module: module
                  msg: msg
                  requestId: requestId
                  route: route
                  statusCode: statusCode
                  durationMs: durationMs
            - labels:
                level:
                module:
            - timestamp:
                source: ts
                format: RFC3339Nano

      # Parse PostgreSQL logs
      - match:
          selector: '{container=~".*postgres.*"}'
          stages:
            - regex:
                expression: '(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}.\d+ \w+) \[\d+\] (?P<level>\w+):'
            - labels:
                level:
