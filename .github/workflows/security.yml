name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 0" # Every Sunday at 06:00 UTC
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build -f Dockerfile.production -t crm-app:scan .

      - name: Scan filesystem for leaked secrets
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          scanners: "secret"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "crm-app:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          scanners: "vuln"

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "crm-app:scan"
          format: "cyclonedx"
          output: "sbom.cdx.json"
          scanners: "vuln"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90
