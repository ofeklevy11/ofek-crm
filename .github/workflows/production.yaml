name: Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm explicitly
        run: npm install -g pnpm@10.5.2

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Wake Neon Database
        run: node -e "const{Client}=require('pg');const c=new Client({connectionString:process.env.DATABASE_URL,connectionTimeoutMillis:30000});c.connect().then(()=>c.query('SELECT 1')).then(()=>{console.log('Database is awake');c.end()}).catch(e=>{console.error(e);process.exit(1)})"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Prisma Migrations
        run: |
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            if npx prisma migrate deploy; then
              echo "Migration succeeded on attempt $i"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              sleep_time=$((i * 10))
              echo "Migration failed, retrying in ${sleep_time}s..."
              sleep $sleep_time
            fi
          done
          echo "Migration failed after 3 attempts"
          exit 1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "1"

      - name: Deploy Project Artifacts
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}